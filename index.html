<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />

  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    body { margin: 0; background: black; }
    #globe { width: 100vw; height: 100vh; }
    
    /* Mantendo seu layout, mas adicionando a barra lateral que você pediu */
    #sidebar {
      position: absolute;
      top: 0; right: 0;
      width: 300px; height: 100vh;
      background: rgba(0,0,0,0.8);
      color: white;
      font-family: sans-serif;
      border-left: 1px solid rgba(196,154,59,0.5);
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
      z-index: 10;
    }
    .artista-item {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }
    .artista-item:hover { background: rgba(196,154,59,0.2); }
  </style>
</head>
<body>

<div id="sidebar">
  <h2 style="color: #c49a3b">Artistas</h2>
  <div id="lista-total">Clique em uma região...</div>
</div>

<div id="globe"></div>

<script>
// --- CADASTRO DE ARTISTAS (Adicione os novos aqui) ---
const artistas = [
  { nome: "Seu Nome", lat: -23.5505, lng: -46.6333, estado: "São Paulo", link: "https://link1.com" },
  { nome: "Artista Exemplo 2", lat: -22.9068, lng: -43.1729, estado: "Rio de Janeiro", link: "https://link2.com" }
];

const globe = Globe()(document.getElementById('globe'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('#000000');

// 🎮 CONTROLES
const controls = globe.controls();
controls.enableZoom = true;
controls.enablePan = true;
controls.autoRotate = false; // Desliguei para facilitar o seu cadastro/clique

// 🌞 LUZ
const ambient = new THREE.AmbientLight(0xffffff, 1);
globe.scene().add(ambient);

// 🌍 FRONTEIRAS DOS ESTADOS DO BRASIL
fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson')
  .then(res => res.json())
  .then(data => {
    globe.polygonsData(data.features)
      .polygonCapColor(() => "rgba(196,154,59,0.1)")
      .polygonStrokeColor(() => "rgba(255,255,255,0.8)")
      .polygonAltitude(0.01)
      .onPolygonClick(d => {
        // Zoom no Estado clicado
        const estadoClicado = d.properties.name;
        // Centraliza no Brasil/Estado com zoom
        globe.pointOfView({ lat: -15, lng: -50, altitude: 1.2 }, 1000);
        
        filtrarArtistas(estadoClicado);
      });
  });

// ✨ ESTRELINHAS (ARTISTAS) NO MAPA
globe.pointsData(artistas)
  .pointColor(() => "#c49a3b")
  .pointRadius(0.5)
  .pointAltitude(0.05)
  .onPointClick(p => window.open(p.link, '_blank'));

// Função para atualizar a listagem lateral
function filtrarArtistas(estado) {
  const listaDiv = document.getElementById('lista-total');
  const filtrados = artistas.filter(a => a.estado === estado);
  
  if(filtrados.length === 0) {
    listaDiv.innerHTML = `<p>Nenhum artista em ${estado} ainda.</p>`;
  } else {
    listaDiv.innerHTML = `<h3>${estado}</h3>` + filtrados.map(a => `
      <div class="artista-item" onclick="window.open('${a.link}', '_blank')">
        ⭐ ${a.nome}
      </div>
    `).join('');
  }
}

// ✨ ESTRELAS DE FUNDO
const starGeo = new THREE.BufferGeometry();
const positions = new Float32Array(1000 * 3);
for (let i = 0; i < 3000; i++) positions[i] = (Math.random() - 0.5) * 2000;
starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
globe.scene().add(stars);

</script>
</body>
</html>

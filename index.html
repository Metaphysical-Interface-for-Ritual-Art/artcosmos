<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  var map = L.map('map').setView([-14.2, -51.9], 4);

  // mapa escuro mas visível
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

  // ponto SP (mais visível)
  L.circleMarker([-23.55, -46.63], {
    radius: 6,
    color: "#ffffff",
    fillColor: "#ffffff",
    fillOpacity: 1
  }).addTo(map)
    .bindPopup("Artista teste — São Paulo");

  // ponto RJ
  L.circleMarker([-22.90, -43.20], {
    radius: 6,
    color: "#ffffff",
    fillColor: "#ffffff",
    fillOpacity: 1
  }).addTo(map)
    .bindPopup("Artista teste — Rio de Janeiro");

</script>

</body>
</html>

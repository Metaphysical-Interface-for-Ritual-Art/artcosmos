<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />

  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    body {
      margin: 0;
      background: black;
    }

    #globe {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="globe"></div>

<script>
  const globe = Globe()(document.getElementById('globe'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
    .backgroundColor('#000000');

  // rotação suave
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.3;

  // 🌞 LUZ SUAVE (efeito sol atrás)
  const light = new THREE.DirectionalLight(0xffe6b0, 1.2);
  light.position.set(-200, 100, 400);
  globe.scene().add(light);

  const ambient = new THREE.AmbientLight(0x888888);
  globe.scene().add(ambient);

  // 🌍 carregar países
  fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
    .then(res => res.json())
    .then(worldData => {

      const countries = topojson.feature(
        worldData,
        worldData.objects.countries
      ).features;

      // polígonos (contorno)
      globe.polygonsData(countries)
        .polygonCapColor(d =>
          d.properties.name === "Brazil"
            ? "rgba(196,154,59,0.7)"
            : "rgba(255,255,255,0.02)"
        )
        .polygonStrokeColor(() => "rgba(255,255,255,0.25)")
        .polygonAltitude(d =>
          d.properties.name === "Brazil" ? 0.02 : 0.004
        );

      // 🔤 LABELS DOS PAÍSES
      globe.labelsData(
        countries.map(d => ({
          lat: d.properties.latitude || d.properties.lat || 0,
          lng: d.properties.longitude || d.properties.lng || 0,
          text: d.properties.name
        }))
      )
      .labelText('text')
      .labelSize(1.5)
      .labelColor(() => 'rgba(255,255,255,0.6)')
      .labelAltitude(0.02);
    });

  // ✨ estrelas suaves
  const starsGeometry = new THREE.BufferGeometry();
  const starCount = 1500;

  const positions = new Float32Array(starCount * 3);

  for (let i = 0; i < starCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 2000;
  }

  starsGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions, 3)
  );

  const starsMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.7,
    opacity: 0.6,
    transparent: true
  });

  const stars = new THREE.Points(starsGeometry, starsMaterial);
  globe.scene().add(stars);

  // 📍 pontos artistas
  globe.pointsData([
    { lat: -23.55, lng: -46.63, name: "SP" },
    { lat: -22.90, lng: -43.20, name: "RJ" }
  ])
  .pointColor(() => '#ffffff')
  .pointAltitude(0.01)
  .pointRadius(0.4);

</script>

</body>
</html>

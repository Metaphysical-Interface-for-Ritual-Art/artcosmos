<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />

  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    body { margin: 0; background: black; }
    #globe { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<div id="globe"></div>

<script>
const globe = Globe()(document.getElementById('globe'))
  // 🌍 textura equilibrada (nem clara demais, nem escura demais)
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
  .backgroundColor('#000000');

// 🎮 CONTROLES
const controls = globe.controls();
controls.enableZoom = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.2;

// 🌞 LUZ AJUSTADA (esse é o segredo)
const ambient = new THREE.AmbientLight(0xffffff, 1.5);
globe.scene().add(ambient);

const light = new THREE.DirectionalLight(0xffe6b0, 1.2);
light.position.set(-200, 200, 400);
globe.scene().add(light);

// 🌍 PAÍSES
fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
  .then(res => res.json())
  .then(worldData => {

    const countries = topojson.feature(
      worldData,
      worldData.objects.countries
    ).features;

    globe.polygonsData(countries)
      // ✨ AGORA VISÍVEL MAS ELEGANTE
      .polygonCapColor(d =>
        d.properties.name === "Brazil"
          ? "rgba(196,154,59,0.8)"
          : "rgba(255,255,255,0.08)"
      )
      // ✨ outline fino chique
      .polygonStrokeColor(() => "rgba(255,255,255,0.6)")
      .polygonAltitude(d =>
        d.properties.name === "Brazil" ? 0.02 : 0.004
      );

    // 🎯 CLICK + ZOOM
    globe.onPolygonClick(d => {
      const coords = d.geometry.coordinates.flat(2);
      let lat = 0, lng = 0, count = 0;

      coords.forEach(c => {
        if (Array.isArray(c)) {
          lng += c[0];
          lat += c[1];
          count++;
        }
      });

      globe.pointOfView(
        { lat: lat / count, lng: lng / count, altitude: 1.2 },
        1000
      );
    });

  });

// ✨ estrelas (bem sutis)
const starGeo = new THREE.BufferGeometry();
const starCount = 600;
const positions = new Float32Array(starCount * 3);

for (let i = 0; i < starCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 2000;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.5,
  opacity: 0.4,
  transparent: true
});

globe.scene().add(new THREE.Points(starGeo, starMat));

</script>
</body>
</html>

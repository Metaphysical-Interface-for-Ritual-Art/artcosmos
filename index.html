<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>

  <style>
    body { margin: 0; background: black; overflow: hidden; font-family: 'Garamond', serif; }
    #globe { width: 100vw; height: 100vh; }
    
    #sidebar {
      position: absolute;
      top: 0; right: 0;
      width: 380px; height: 100vh;
      background: rgba(5, 5, 5, 0.95);
      color: #c49a3b;
      border-left: 1px solid rgba(196, 154, 59, 0.3);
      padding: 40px 30px;
      box-sizing: border-box;
      display: none;
      z-index: 100;
    }

    .close-btn { position: absolute; top: 20px; right: 20px; color: #c49a3b; cursor: pointer; font-size: 24px; }

    .artista-card {
      border-bottom: 1px solid rgba(196, 154, 59, 0.2);
      padding: 20px 0;
      cursor: pointer;
    }
    .artista-card:hover { color: white; }
    
    h2 { font-weight: lighter; letter-spacing: 5px; text-transform: uppercase; border-bottom: 1px solid #c49a3b; padding-bottom: 15px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="close-btn" onclick="fecharPainel()">✕</div>
  <h2 id="regiao-titulo">São Paulo</h2>
  <div id="lista-artistas"></div>
</div>

<div id="globe"></div>

<script>
// <=== COLE O SEU LINK DA PLANILHA (CSV) ABAIXO ENTRE AS ASPAS ===
const URL_PLANILHA = https://docs.google.com/spreadsheets/d/1kUl3PZag6aHHD-Q7qMaTC2J-VV4X9xtCrzCt9jhIXxY/edit?usp=sharing;

let artistasData = [];

const globe = Globe()(document.getElementById('globe'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundColor('#000000')
  .showAtmosphere(true)
  .atmosphereColor("#c49a3b");

// 1. FUNÇÃO QUE BUSCA OS DADOS DA SUA PLANILHA
function carregarArtistas() {
  fetch(URL_PLANILHA)
    .then(res => res.text())
    .then(csv => {
      const linhas = csv.split('\n').slice(1); // Pula o cabeçalho da planilha
      artistasData = linhas.map(linha => {
        // A ordem aqui deve ser a mesma das colunas da sua planilha:
        // Nome, Estado, Cidade, Site, Instagram, Contato
        const [nome, estado, cidade, site, instagram, contato] = linha.split(',');
        
        // Coordenadas automáticas simplificadas (ajustaremos conforme necessário)
        // Por enquanto, centralizamos no estado para teste
        return {
          nome: nome?.trim(),
          estado: estado?.trim(),
          cidade: cidade?.trim(),
          link: site?.trim() || instagram?.trim(),
          lat: estado?.trim() === "São Paulo" ? -23.55 : -15.79, // Exemplo de lat
          lng: estado?.trim() === "São Paulo" ? -46.63 : -47.88  // Exemplo de lng
        };
      }).filter(a => a.nome); // Remove linhas vazias

      desenharEstrelas();
    });
}

// 2. DESENHA AS ESTRELINHAS NO GLOBO
function desenharEstrelas() {
  globe.htmlElementsData(artistasData)
    .htmlElement(d => {
      const el = document.createElement('div');
      el.innerHTML = `<div style="color: #c49a3b; font-size: 20px; text-shadow: 0 0 10px #c49a3b; cursor: pointer;">★</div>`;
      el.onclick = () => abrirPainel(d.estado);
      return el;
    });
}

// 3. MAPA DO BRASIL E CLIQUES
fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson')
  .then(res => res.json())
  .then(geojson => {
    globe.polygonsData(geojson.features)
      .polygonCapColor(() => 'rgba(196, 154, 59, 0.02)')
      .polygonStrokeColor(() => 'rgba(196, 154, 59, 0.4)')
      .onPolygonClick(d => {
        globe.pointOfView({ lat: -15, lng: -50, altitude: 1.2 }, 1000);
        abrirPainel(d.properties.name);
      });
  });

function abrirPainel(nomeEstado) {
  const sidebar = document.getElementById('sidebar');
  const lista = document.getElementById('lista-artistas');
  document.getElementById('regiao-titulo').innerText = nomeEstado;
  sidebar.style.display = 'block';

  const filtrados = artistasData.filter(a => a.estado === nomeEstado);
  
  if(filtrados.length === 0) {
    lista.innerHTML = `<p style="color: #444; margin-top: 20px;">Território em expansão...</p>`;
  } else {
    lista.innerHTML = filtrados.map(a => `
      <div class="artista-card" onclick="window.open('${a.link}', '_blank')">
        <span style="color: #c49a3b">★</span> <strong>${a.nome}</strong><br>
        <div style="font-size: 0.8em; margin-top: 5px; color: #888;">${a.cidade}</div>
      </div>
    `).join('');
  }
}

function fecharPainel() {
  document.getElementById('sidebar').style.display = 'none';
  globe.pointOfView({ altitude: 2.5 }, 1000);
}

// Inicialização
const ambient = new THREE.AmbientLight(0xffffff, 1.2);
globe.scene().add(ambient);
carregarArtistas();
globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.3;
</script>
</body>
</html>

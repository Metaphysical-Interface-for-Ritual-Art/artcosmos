<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />

  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    body {
      margin: 0;
      background: black;
    }

    #globe {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="globe"></div>

<script>
  const globe = Globe()(document.getElementById('globe'))
    // 🌍 textura MAIS CLARA (isso muda tudo)
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .backgroundColor('#000000');

  // rotação
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.25;

  // 🌞 LUZ (bem mais equilibrada)
  const ambient = new THREE.AmbientLight(0xffffff, 1.2);
  globe.scene().add(ambient);

  const directionalLight = new THREE.DirectionalLight(0xffe6b0, 1.5);
  directionalLight.position.set(-300, 200, 400);
  globe.scene().add(directionalLight);

  // 🌍 países
  fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
    .then(res => res.json())
    .then(worldData => {

      const countries = topojson.feature(
        worldData,
        worldData.objects.countries
      ).features;

      globe.polygonsData(countries)
        .polygonCapColor(d =>
          d.properties.name === "Brazil"
            ? "rgba(196,154,59,0.7)"
            : "rgba(255,255,255,0.03)"
        )
        // ✨ CONTORNO MAIS FORTE
        .polygonStrokeColor(() => "rgba(255,255,255,0.6)")
        .polygonAltitude(d =>
          d.properties.name === "Brazil" ? 0.015 : 0.003
        );

      // 🔤 LABELS CORRETOS (centro real do polígono)
      globe.labelsData(
        countries.map(d => {
          const coords = d.geometry.coordinates.flat(2);
          let lat = 0, lng = 0, count = 0;

          coords.forEach(coord => {
            if (Array.isArray(coord)) {
              lng += coord[0];
              lat += coord[1];
              count++;
            }
          });

          return {
            lat: lat / count,
            lng: lng / count,
            text: d.properties.name
          };
        })
      )
      .labelText('text')
      .labelSize(1.2)
      .labelColor(() => 'rgba(255,255,255,0.7)')
      .labelAltitude(0.02);
    });

  // ✨ estrelas mais suaves
  const starsGeometry = new THREE.BufferGeometry();
  const starCount = 1200;

  const positions = new Float32Array(starCount * 3);

  for (let i = 0; i < starCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 2000;
  }

  starsGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions, 3)
  );

  const starsMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.6,
    opacity: 0.5,
    transparent: true
  });

  const stars = new THREE.Points(starsGeometry, starsMaterial);
  globe.scene().add(stars);

  // 📍 pontos
  globe.pointsData([
    { lat: -23.55, lng: -46.63 },
    { lat: -22.90, lng: -43.20 }
  ])
  .pointColor(() => '#ffffff')
  .pointAltitude(0.01)
  .pointRadius(0.4);

</script>

</body>
</html>

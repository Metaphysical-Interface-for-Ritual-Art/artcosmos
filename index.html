<!DOCTYPE html>

<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/globe.gl"></script>

  <script src="https://unpkg.com/topojson-client@3"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      cursor: crosshair;
    }

    #globe { width: 100vw; height: 100vh; }

    /* TÍTULO */
    #title {
      position: fixed;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }

    #title h1 {
      font-family: 'Cinzel', serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
    }

    #title p {
      font-style: italic;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.2em;
      margin-top: 4px;
    }

    /* CARD DO ARTISTA */
    #artist-card {
      position: fixed;
      top: 50%;
      right: 48px;
      transform: translateY(-50%);
      width: 260px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 28px 24px;
      z-index: 200;
      display: none;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(calc(-50% + 12px)); }
      to   { opacity: 1; transform: translateY(-50%); }
    }

    #artist-card .close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 16px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.1em;
    }

    #artist-card .close:hover { color: rgba(255,255,255,0.8); }

    #artist-card .star {
      font-size: 18px;
      margin-bottom: 14px;
      display: block;
    }

    #artist-card .name {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }

    #artist-card .location {
      font-style: italic;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    #artist-card .divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 16px;
    }

    #artist-card .discipline {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #artist-card .bio {
      font-size: 12.5px;
      color: rgba(255,255,255,0.55);
      line-height: 1.75;
      font-style: italic;
    }

    #artist-card .link {
      display: inline-block;
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    #artist-card .link:hover {
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.4);
    }

    /* LEGENDA INFERIOR */
    #legend {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
      pointer-events: none;
      font-family: 'Cinzel', serif;
    }

    /* CONTADOR */
    #counter {
      position: fixed;
      bottom: 32px;
      right: 48px;
      text-align: right;
      pointer-events: none;
    }

    #counter .number {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,0.15);
      line-height: 1;
    }

    #counter .label {
      font-size: 9px;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.1);
      text-transform: uppercase;
      margin-top: 3px;
    }
  </style>

</head>
<body>

<div id="globe"></div>

<div id="title">
  <h1>Arte Cosmos</h1>
  <p>um atlas de artistas visuais</p>
</div>

<div id="artist-card">
  <span class="close" onclick="closeCard()">✕</span>
  <span class="star" id="card-star">✦</span>
  <div class="name" id="card-name">—</div>
  <div class="location" id="card-location">—</div>
  <div class="divider"></div>
  <div class="discipline" id="card-discipline">—</div>
  <div class="bio" id="card-bio">—</div>
  <a href="#" class="link" id="card-link" target="_blank">ver portfólio →</a>
</div>

<div id="legend">clique sobre uma ✦ para conhecer o artista</div>

<div id="counter">
  <div class="number" id="artist-count">0</div>
  <div class="label">artistas</div>
</div>

<script>

// ─────────────────────────────────────────────
// ARTISTAS — edite aqui para adicionar novos
// ─────────────────────────────────────────────
const ARTISTS = [
  {
    name: "Deusa",
    neighborhood: "Butantã",
    city: "São Paulo",
    country: "Brasil",
    lat: -23.5663,
    lng: -46.7172,
    discipline: "Escultura · Instalação · Vídeo",
    bio: "Pesquisa símbolos, proto-linguagem e metafísica. A matéria como sítio de transmissão entre dimensões.",
    link: "https://instagram.com",
    color: "#c49a3b"
  }
  // Para adicionar outro artista, copie o bloco acima e cole aqui:
  // {
  //   name: "Nome do Artista",
  //   neighborhood: "Bairro",
  //   city: "Cidade",
  //   country: "País",
  //   lat: 00.0000,   ← latitude
  //   lng: 00.0000,   ← longitude
  //   discipline: "Pintura · Fotografia",
  //   bio: "Uma frase sobre o trabalho.",
  //   link: "https://...",
  //   color: "#ffffff"  ← cor da estrela
  // },
];

// ─────────────────────────────────────────────
// GLOBO
// ─────────────────────────────────────────────
const globe = Globe()(document.getElementById('globe'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .backgroundColor('#000000');

// CONTROLES
const controls = globe.controls();
controls.enableZoom = true;
controls.enablePan = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.15;

// LUZ
const ambient = new THREE.AmbientLight(0xffffff, 1);
globe.scene().add(ambient);
const sun = new THREE.DirectionalLight(0xffe6b0, 1.2);
sun.position.set(-300, 200, 400);
globe.scene().add(sun);

// ESTRELAS DE FUNDO
const starGeo = new THREE.BufferGeometry();
const starCount = 1200;
const positions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 2000;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, opacity: 0.45, transparent: true });
globe.scene().add(new THREE.Points(starGeo, starMat));

// PAÍSES
fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
  .then(res => res.json())
  .then(worldData => {
    const countries = topojson.feature(worldData, worldData.objects.countries).features;

    globe.polygonsData(countries)
      .polygonCapColor(d =>
        d.properties.name === "Brazil"
          ? "rgba(196,154,59,0.07)"
          : "rgba(255,255,255,0.01)"
      )
      .polygonStrokeColor(() => "rgba(255,255,255,0.22)")
      .polygonAltitude(d =>
        d.properties.name === "Brazil" ? 0.005 : 0.001
      );

    globe.onPolygonClick(d => {
      const coords = d.geometry.coordinates.flat(Infinity);
      let lat = 0, lng = 0, count = 0;
      for (let i = 0; i < coords.length - 1; i += 2) {
        if (typeof coords[i] === 'number' && typeof coords[i+1] === 'number') {
          lng += coords[i];
          lat += coords[i+1];
          count++;
        }
      }
      if (count > 0) {
        globe.pointOfView({ lat: lat / count, lng: lng / count, altitude: 1.2 }, 1200);
      }
    });
  });

// MARCADORES DOS ARTISTAS
function buildMarkers() {
  document.getElementById('artist-count').textContent = ARTISTS.length;

  globe
    .pointsData(ARTISTS)
    .pointLat(d => d.lat)
    .pointLng(d => d.lng)
    .pointAltitude(0.02)
    .pointRadius(0.4)
    .pointColor(d => d.color || '#ffffff')
    .pointLabel(d => `
      <div style="
        font-family: 'Cormorant Garamond', serif;
        background: rgba(0,0,0,0.8);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 8px 14px;
        font-size: 13px;
        color: rgba(255,255,255,0.8);
        letter-spacing: 0.1em;
        backdrop-filter: blur(8px);
      ">
        ✦ ${d.name}<br>
        <span style="font-style:italic;font-size:11px;color:rgba(255,255,255,0.4)">
          ${d.neighborhood}, ${d.city}
        </span>
      </div>
    `)
    .onPointClick(d => {
      openCard(d);
      controls.autoRotate = false;
      globe.pointOfView({ lat: d.lat, lng: d.lng, altitude: 0.8 }, 1000);
    });
}

buildMarkers();

// ─────────────────────────────────────────────
// CARD
// ─────────────────────────────────────────────
function openCard(artist) {
  document.getElementById('card-name').textContent = artist.name;
  document.getElementById('card-location').textContent =
    `${artist.neighborhood} · ${artist.city} · ${artist.country}`;
  document.getElementById('card-discipline').textContent = artist.discipline;
  document.getElementById('card-bio').textContent = artist.bio;
  document.getElementById('card-star').style.color = artist.color || '#ffffff';

  const link = document.getElementById('card-link');
  if (artist.link) {
    link.href = artist.link;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }

  const card = document.getElementById('artist-card');
  card.style.display = 'block';
  void card.offsetWidth; // força reflow para animação
  card.style.animation = 'none';
  card.style.animation = 'fadeIn 0.4s ease';
}

function closeCard() {
  document.getElementById('artist-card').style.display = 'none';
  controls.autoRotate = true;
}

// Clique fora do card fecha
document.getElementById('globe').addEventListener('click', e => {
  if (e.target.id === 'globe') closeCard();
});

</script>

</body>
</html>

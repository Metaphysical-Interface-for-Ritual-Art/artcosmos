<!DOCTYPE html>
<html>
<head>
  <title>Arte Cosmos</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #050505, #000000);
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      filter: brightness(0.7) contrast(1.2);
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  var map = L.map('map', {
    zoomControl: false
  }).setView([-14.2, -51.9], 4);

  // mapa escuro (sem nomes)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

  // artista exemplo SP
  L.circleMarker([-23.55, -46.63], {
    radius: 5,
    color: "#ffffff",
    fillColor: "#ffffff",
    fillOpacity: 0.9
  }).addTo(map)
    .bindPopup("Artista teste — São Paulo");

  // artista exemplo RJ
  L.circleMarker([-22.90, -43.20], {
    radius: 5,
    color: "#ffffff",
    fillColor: "#ffffff",
    fillOpacity: 0.9
  }).addTo(map)
    .bindPopup("Artista teste — Rio de Janeiro");

</script>

</body>
</html>
